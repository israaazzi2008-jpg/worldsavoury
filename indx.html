<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World's Savoury - Accueil</title>

<!-- Polices Élégantes -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

<style>
/* RESET & FONDS ROSE BÉBÉ */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at center, #ffffff 0%, #fffbfa 50%, #fff0f3 100%); /* Doux Ivoire et Rose Bébé clair */
  font-family: 'Cormorant Garamond', serif;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  cursor: pointer;
}

/* ÉTINCELLES DÉLICATES DORÉES VOLANTES */
.cupcake {
  position: fixed;
  top: -50px;
  font-size: 14px;
  color: #e5b358;
  text-shadow: 0 0 6px rgba(229, 179, 88, 0.5);
  animation: fall 6.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  pointer-events: none;
  z-index: 99;
  filter: drop-shadow(0 2px 5px rgba(229, 179, 88, 0.2));
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg) scale(0.85); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(115vh) rotate(320deg) scale(1); opacity: 0; }
}

/* ÉTINCELLES ASCENDANTES */
.sparkle {
  position: fixed;
  width: 5px;
  height: 5px;
  background: rgba(212, 175, 55, 0.7); /* Doré chaleureux */
  border-radius: 50%;
  animation: floatSparkle 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  pointer-events: none;
}

@keyframes floatSparkle {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-160px) scale(0); opacity: 0; }
}

/* CONTENEUR PRINCIPAL */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 24px;
  user-select: none;
  z-index: 10;
}

/* LOGO DE LUXE AVEC STRASS / GRADIENT DORE */
.logo {
  width: clamp(140px, 35vw, 210px);
  height: clamp(140px, 35vw, 210px);
  aspect-ratio: 1/1;
  border-radius: 50%; /* Rend le logo parfaitement rond */
  object-fit: cover; /* Recadre l'image sans la déformer */
  border: 4px solid #fff; /* Élégant liseré blanc */
  outline: 2px solid #d4af37; /* Fin liseré d'or de prestige */
  box-shadow: 0 12px 30px rgba(183, 110, 121, 0.25), 0 0 15px rgba(212, 175, 55, 0.1); 
  opacity: 0;
  animation: logoIn 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes logoIn {
  from { opacity: 0; transform: scale(0.75); }
  to { opacity: 1; transform: scale(1); }
}

/* TITRE CALLIGRAPHIE */
.title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(42px, 8vw, 84px);
  color: #b76e79; /* Doré rose foncé signature */
  opacity: 0;
  animation: writeIn 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  animation-delay: 1.1s;
  text-shadow: 0 2px 10px rgba(183, 110, 121, 0.15);
  line-height: 1.1;
}

@keyframes writeIn {
  0% { opacity: 0; transform: translateY(12px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ❤️ ANIMATION DE COEUR */
.heart {
  width: clamp(80px, 20vw, 120px);
  height: clamp(80px, 20vw, 120px);
  fill: none;
  stroke: #b76e79;
  stroke-width: 11;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 1600;
  stroke-dashoffset: 1600;
  opacity: 0;
  animation:
    drawHeart 1.8s ease forwards,
    heartbeat 0.6s ease-in-out 1.8s infinite;
  animation-delay: 0.2s;
  filter: drop-shadow(0 4px 6px rgba(183, 110, 121, 0.25));
}

@keyframes drawHeart {
  0% { stroke-dashoffset: 1600; opacity: 1; }
  70% { opacity: 1; }
  100% { stroke-dashoffset: 0; opacity: 1; }
}

@keyframes heartbeat {
  0% { transform: scale(1); }
  14% { transform: scale(1.1); }
  28% { transform: scale(1); }
  42% { transform: scale(1.06); }
  70% { transform: scale(1); }
}

/* INDICATION */
.hint {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #b76e79;
  margin-top: 20px;
  opacity: 0.8;
  animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}

/* SÉLECTION TRANSPARENTE */
::selection {
  background: transparent;
}
</style>
</head>

<body onclick="skipToMenu()" title="Cliquez n'importe où pour accéder de suite au menu">

<div class="container">
  
  <!-- LOGO FIXÉ (ROND ET NETTOYÉ) -->
  <img src="logo.jpg" class="logo" alt="logo de World's Savoury">

  <!-- TITRE DESSINÉ -->
  <div class="title">World's Savoury</div>

  <!-- ❤️ COEUR OUTLINE -->
  <svg class="heart" viewBox="0 0 512 512">
    <path d="M256 460
    C180 420, 90 340, 110 240
    C125 170, 190 150, 230 180
    C245 195, 250 210, 256 220
    C262 210, 267 195, 282 180
    C322 150, 387 170, 402 240
    C422 340, 332 420, 256 460Z"/>
  </svg>

  <!-- PETITE CONSIGNES TRÈS PRO -->
  <div class="hint">Entrée en cours • Cliquer pour passer</div>

  <!-- DESIGNER SIGNATURE -->
  <div style="position: absolute; bottom: 12px; font-family: sans-serif; font-size: 11px; letter-spacing: 1px; color: #b76e79; opacity: 0.8; font-weight: 500;">
    Designed by <span style="font-weight: bold;">azzi israa</span>
  </div>

</div>

<script>
/* ✧ EMITTING PREMIUM STARDUST Sparkles */
function cupcake(){
  let c = document.createElement("div");
  c.className = "cupcake";
  // Alternate between elegant gold star types
  c.innerHTML = Math.random() > 0.5 ? "✦" : "✧";
  c.style.left = Math.random() * 95 + "vw";
  
  // Vitesse aléatoire pour un effet de profondeur saisissant
  const speed = 5 + Math.random() * 3;
  c.style.animationDuration = speed + "s";
  
  // Taille et rotation de départ
  const size = 10 + Math.random() * 8;
  c.style.fontSize = size + "px";
  
  document.body.appendChild(c);
  setTimeout(() => c.remove(), speed * 1000);
}
setInterval(cupcake, 350);

/* ✨ EMITTING SPARKLES */
function sparkle(){
  let s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.bottom = "20px";
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 3000);
}
setInterval(sparkle, 200);

/* ⏱️ SKIP TO MENU */
let isSkipping = false;
function skipToMenu() {
  if (isSkipping) return;
  isSkipping = true;
  document.body.style.transition = "opacity 0.6s ease";
  document.body.style.opacity = "0";
  setTimeout(() => {
    window.location.href = "menu.html";
  }, 600);
}

/* AUTOMATIC TRANSITION (2.2 SECONDS - ONCE DRAWING ENDS) */
setTimeout(() => {
  skipToMenu();
}, 2200);
</script>

</body>
</html>
